  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      font-size: 15px;
    }
    header {
      background: #1a73e8;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,.15);
    }
    header h1 { font-size: 18px; font-weight: 700; }
    header span { font-size: 12px; opacity: .8; }
    .filters {
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filters button {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #ddd;
      background: #f5f5f5;
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
    }
    .filters button.active {
      background: #1a73e8;
      color: #fff;
      border-color: #1a73e8;
    }
    .week-group { margin: 12px 16px; }
    .week-label {
      font-size: 12px;
      font-weight: 700;
      color: #888;
      letter-spacing: .5px;
      margin-bottom: 8px;
      padding-left: 4px;
    }
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .date-badge {
      min-width: 52px;
      text-align: center;
      background: #e8f0fe;
      border-radius: 8px;
      padding: 6px 4px;
    }
    .date-badge .day { font-size: 22px; font-weight: 700; color: #1a73e8; line-height: 1; }
    .date-badge .dow { font-size: 11px; color: #5f6368; margin-top: 3px; }
    .card-body { flex: 1; min-width: 0; }
    .corp-name {
      font-weight: 700;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .corp-meta { font-size: 12px; color: #888; margin-top: 3px; }
    .badge {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 12px;
      white-space: nowrap;
      font-weight: 600;
    }
    .badge-confirmed { background: #e6f4ea; color: #1e7e34; }
    .badge-expected  { background: #fff8e1; color: #f57f17; }
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 14px;
    }
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 11px;
      color: #bbb;
    }
    @media (max-width: 480px) {
      .week-group { margin: 8px 10px; }
      .card { padding: 12px; gap: 10px; }
    }
  </style>
</head>

const UPDATED = "2026-05-16 09:35 KST";
const DOW = ['일','월','화','수','목','금','토'];

function parseDt(d) {
  const y = d.slice(0,4), m = d.slice(4,6), day = d.slice(6,8);
  const dt = new Date(+y, +m-1, +day);
  return { m, day, dow: DOW[dt.getDay()], label: `${y}년 ${m}월 ${Math.ceil(+day/7)}주` };
}

let _filter = 'all';

function setFilter(type, btn) {
  _filter = type;
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const root = document.getElementById('root');
  let data = DATA;

  if (_filter === 'confirmed') data = data.filter(r => r.confirmed === 1);
  else if (_filter === 'expected') data = data.filter(r => r.confirmed === 0);
  else if (_filter === 'KOSPI')  data = data.filter(r => r.market === 'Y');
  else if (_filter === 'KOSDAQ') data = data.filter(r => r.market === 'K');

  if (!data.length) {
    root.innerHTML = '<div class="empty">해당하는 실적발표 일정이 없습니다.</div>';
    return;
  }

  // 주별 그룹
  const weeks = {};
  data.forEach(r => {
    const dt = parseDt(r.announce_dt);
    if (!weeks[dt.label]) weeks[dt.label] = [];
    weeks[dt.label].push({ ...r, _dt: dt });
  });

  const mktLabel = { Y: 'KOSPI', K: 'KOSDAQ', N: 'KONEX', E: '기타' };

  root.innerHTML = Object.entries(weeks).map(([week, rows]) => `
    <div class="week-group">
      <div class="week-label">${week}</div>
      ${rows.map(r => `
        <div class="card">
          <div class="date-badge">
            <div class="day">${r._dt.day}</div>
            <div class="dow">${r._dt.m}/${r._dt.day} ${r._dt.dow}</div>
          </div>
          <div class="card-body">
            <div class="corp-name">${r.corp_name}</div>
            <div class="corp-meta">${r.stock_code} · ${mktLabel[r.market] || r.market}</div>
          </div>
          <span class="badge ${r.confirmed ? 'badge-confirmed' : 'badge-expected'}">
            ${r.confirmed ? '확정' : '예상'}
          </span>
        </div>
      `).join('')}
    </div>
  `).join('');
}

document.getElementById('updated-label').textContent = UPDATED ? `업데이트: ${UPDATED}` : '';
document.getElementById('footer').textContent = UPDATED ? `마지막 업데이트: ${UPDATED}` : '';
render();
</script>
