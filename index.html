<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>실적발표 캘린더</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      font-size: 15px;
    }
    header {
      background: #1a73e8;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,.15);
    }
    header h1 { font-size: 18px; font-weight: 700; }
    header span { font-size: 12px; opacity: .8; }
    .filters {
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filters button {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #ddd;
      background: #f5f5f5;
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
    }
    .filters button.active {
      background: #1a73e8;
      color: #fff;
      border-color: #1a73e8;
    }
    .week-group { margin: 12px 16px; }
    .week-label {
      font-size: 12px;
      font-weight: 700;
      color: #888;
      letter-spacing: .5px;
      margin-bottom: 8px;
      padding-left: 4px;
    }
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .date-badge {
      min-width: 52px;
      text-align: center;
      background: #e8f0fe;
      border-radius: 8px;
      padding: 6px 4px;
    }
    .date-badge .day { font-size: 22px; font-weight: 700; color: #1a73e8; line-height: 1; }
    .date-badge .dow { font-size: 11px; color: #5f6368; margin-top: 3px; }
    .card-body { flex: 1; min-width: 0; }
    .corp-name {
      font-weight: 700;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .corp-meta { font-size: 12px; color: #888; margin-top: 3px; }
    .badge {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 12px;
      white-space: nowrap;
      font-weight: 600;
    }
    .badge-confirmed { background: #e6f4ea; color: #1e7e34; }
    .badge-expected  { background: #fff8e1; color: #f57f17; }
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 14px;
    }
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 11px;
      color: #bbb;
    }
    @media (max-width: 480px) {
      .week-group { margin: 8px 10px; }
      .card { padding: 12px; gap: 10px; }
    }
  </style>
</head>
<body>

<header>
  <h1>📅 실적발표 캘린더</h1>
  <span id="updated-label"></span>
</header>

<div class="filters">
  <button class="active" onclick="setFilter('all', this)">전체</button>
  <button onclick="setFilter('confirmed', this)">확정</button>
  <button onclick="setFilter('expected', this)">예상</button>
  <button onclick="setFilter('KOSPI', this)">KOSPI</button>
  <button onclick="setFilter('KOSDAQ', this)">KOSDAQ</button>
</div>

<div id="root"></div>
<div class="footer" id="footer"></div>

<script>
const DATA = [{"stock_code": "003490", "corp_name": "대한항공", "market": "Y", "announce_dt": "20260413", "rcept_no": "20260413800538", "confirmed": 1, "created_at": "2026-04-13T08:20:54"}, {"stock_code": "241770", "corp_name": "메카로", "market": "K", "announce_dt": "20260413", "rcept_no": "20260413900358", "confirmed": 1, "created_at": "2026-04-13T08:20:54"}, {"stock_code": "002320", "corp_name": "한진", "market": "Y", "announce_dt": "20260413", "rcept_no": "20260413800816", "confirmed": 1, "created_at": "2026-04-18T09:15:55"}, {"stock_code": "229640", "corp_name": "LS에코에너지", "market": "Y", "announce_dt": "20260414", "rcept_no": "20260414800130", "confirmed": 1, "created_at": "2026-04-14T08:11:17"}, {"stock_code": "036460", "corp_name": "한국가스공사", "market": "Y", "announce_dt": "20260414", "rcept_no": "", "confirmed": 0, "created_at": "2026-04-18T09:15:55"}, {"stock_code": "271560", "corp_name": "오리온", "market": "Y", "announce_dt": "20260414", "rcept_no": "", "confirmed": 0, "created_at": "2026-04-18T09:15:55"}, {"stock_code": "089970", "corp_name": "브이엠", "market": "K", "announce_dt": "20260415", "rcept_no": "20260415900316", "confirmed": 1, "created_at": "2026-04-15T08:08:38"}, {"stock_code": "089030", "corp_name": "테크윙", "market": "K", "announce_dt": "20260415", "rcept_no": "20260415900206", "confirmed": 1, "created_at": "2026-04-15T08:08:38"}, {"stock_code": "052400", "corp_name": "코나아이", "market": "K", "announce_dt": "20260415", "rcept_no": "20260415900107", "confirmed": 1, "created_at": "2026-04-15T08:08:38"}, {"stock_code": "046890", "corp_name": "서울반도체", "market": "K", "announce_dt": "20260415", "rcept_no": "20260415900706", "confirmed": 1, "created_at": "2026-04-18T09:15:55"}, {"stock_code": "092190", "corp_name": "서울바이오시스", "market": "K", "announce_dt": "20260415", "rcept_no": "20260415900679", "confirmed": 1, "created_at": "2026-04-18T09:15:55"}, {"stock_code": "009540", "corp_name": "HD한국조선해양", "market": "Y", "announce_dt": "20260415", "rcept_no": "", "confirmed": 0, "created_at": "2026-04-18T09:15:55"}, {"stock_code": "010620", "corp_name": "에이치디현대미포", "market": "E", "announce_dt": "20260415", "rcept_no": "", "confirmed": 0, "created_at": "2026-04-18T09:15:55"}, {"stock_code": "329180", "corp_name": "HD현대중공업", "market": "Y", "announce_dt": "20260415", "rcept_no": "", "confirmed": 0, "created_at": "2026-04-18T09:15:55"}, {"stock_code": "039840", "corp_name": "디오", "market": "K", "announce_dt": "20260416", "rcept_no": "20260416900122", "confirmed": 1, "created_at": "2026-04-16T08:12:05"}, {"stock_code": "114810", "corp_name": "한솔아이원스", "market": "K", "announce_dt": "20260416", "rcept_no": "", "confirmed": 0, "created_at": "2026-04-18T09:15:55"}, {"stock_code": "058970", "corp_name": "엠로", "market": "K", "announce_dt": "20260417", "rcept_no": "", "confirmed": 0, "created_at": "2026-04-18T09:15:55"}, {"stock_code": "007690", "corp_name": "국도화학", "market": "Y", "announce_dt": "20260417", "rcept_no": "", "confirmed": 0, "created_at": "2026-04-18T09:15:55"}, {"stock_code": "071320", "corp_name": "지역난방공사", "market": "Y", "announce_dt": "20260417", "rcept_no": "", "confirmed": 0, "created_at": "2026-04-18T09:15:55"}, {"stock_code": "017860", "corp_name": "DS단석", "market": "Y", "announce_dt": "20260417", "rcept_no": "", "confirmed": 0, "created_at": "2026-04-18T09:15:55"}];
const UPDATED = "2026-04-18 09:15 KST";
const DOW = ['일','월','화','수','목','금','토'];

function parseDt(d) {
  const y = d.slice(0,4), m = d.slice(4,6), day = d.slice(6,8);
  const dt = new Date(+y, +m-1, +day);
  return { m, day, dow: DOW[dt.getDay()], label: `${y}년 ${m}월 ${Math.ceil(+day/7)}주` };
}

let _filter = 'all';

function setFilter(type, btn) {
  _filter = type;
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const root = document.getElementById('root');
  let data = DATA;

  if (_filter === 'confirmed') data = data.filter(r => r.confirmed === 1);
  else if (_filter === 'expected') data = data.filter(r => r.confirmed === 0);
  else if (_filter === 'KOSPI')  data = data.filter(r => r.market === 'Y');
  else if (_filter === 'KOSDAQ') data = data.filter(r => r.market === 'K');

  if (!data.length) {
    root.innerHTML = '<div class="empty">해당하는 실적발표 일정이 없습니다.</div>';
    return;
  }

  // 주별 그룹
  const weeks = {};
  data.forEach(r => {
    const dt = parseDt(r.announce_dt);
    if (!weeks[dt.label]) weeks[dt.label] = [];
    weeks[dt.label].push({ ...r, _dt: dt });
  });

  const mktLabel = { Y: 'KOSPI', K: 'KOSDAQ', N: 'KONEX', E: '기타' };

  root.innerHTML = Object.entries(weeks).map(([week, rows]) => `
    <div class="week-group">
      <div class="week-label">${week}</div>
      ${rows.map(r => `
        <div class="card">
          <div class="date-badge">
            <div class="day">${r._dt.day}</div>
            <div class="dow">${r._dt.m}/${r._dt.day} ${r._dt.dow}</div>
          </div>
          <div class="card-body">
            <div class="corp-name">${r.corp_name}</div>
            <div class="corp-meta">${r.stock_code} · ${mktLabel[r.market] || r.market}</div>
          </div>
          <span class="badge ${r.confirmed ? 'badge-confirmed' : 'badge-expected'}">
            ${r.confirmed ? '확정' : '예상'}
          </span>
        </div>
      `).join('')}
    </div>
  `).join('');
}

document.getElementById('updated-label').textContent = UPDATED ? `업데이트: ${UPDATED}` : '';
document.getElementById('footer').textContent = UPDATED ? `마지막 업데이트: ${UPDATED}` : '';
render();
</script>
</body>
</html>
