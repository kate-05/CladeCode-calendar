<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>실적발표 캘린더</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      font-size: 15px;
    }
    header {
      background: #1a73e8;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,.15);
    }
    header h1 { font-size: 18px; font-weight: 700; }
    header span { font-size: 12px; opacity: .8; }
    .filters {
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filters button {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #ddd;
      background: #f5f5f5;
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
    }
    .filters button.active {
      background: #1a73e8;
      color: #fff;
      border-color: #1a73e8;
    }
    .week-group { margin: 12px 16px; }
    .week-label {
      font-size: 12px;
      font-weight: 700;
      color: #888;
      letter-spacing: .5px;
      margin-bottom: 8px;
      padding-left: 4px;
    }
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .date-badge {
      min-width: 52px;
      text-align: center;
      background: #e8f0fe;
      border-radius: 8px;
      padding: 6px 4px;
    }
    .date-badge .day { font-size: 22px; font-weight: 700; color: #1a73e8; line-height: 1; }
    .date-badge .dow { font-size: 11px; color: #5f6368; margin-top: 3px; }
    .card-body { flex: 1; min-width: 0; }
    .corp-name {
      font-weight: 700;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .corp-meta { font-size: 12px; color: #888; margin-top: 3px; }
    .badge {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 12px;
      white-space: nowrap;
      font-weight: 600;
    }
    .badge-confirmed { background: #e6f4ea; color: #1e7e34; }
    .badge-expected  { background: #fff8e1; color: #f57f17; }
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 14px;
    }
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 11px;
      color: #bbb;
    }
    @media (max-width: 480px) {
      .week-group { margin: 8px 10px; }
      .card { padding: 12px; gap: 10px; }
    }
  </style>
</head>
<body>

<header>
  <h1>📅 실적발표 캘린더</h1>
  <span id="updated-label"></span>
</header>

<div class="filters">
  <button class="active" onclick="setFilter('all', this)">전체</button>
  <button onclick="setFilter('confirmed', this)">확정</button>
  <button onclick="setFilter('expected', this)">예상</button>
  <button onclick="setFilter('KOSPI', this)">KOSPI</button>
  <button onclick="setFilter('KOSDAQ', this)">KOSDAQ</button>
</div>

<div id="root"></div>
<div class="footer" id="footer"></div>

<script>
const DATA = [{"stock_code": "000270", "corp_name": "기아", "market": "Y", "announce_dt": "20260303", "rcept_no": "20260303800922", "confirmed": 1, "created_at": "2026-03-03T07:51:05"}, {"stock_code": "020150", "corp_name": "롯데에너지머티리얼즈", "market": "Y", "announce_dt": "20260303", "rcept_no": "20260303800792", "confirmed": 1, "created_at": "2026-03-03T07:51:05"}, {"stock_code": "214430", "corp_name": "아이쓰리시스템", "market": "K", "announce_dt": "20260303", "rcept_no": "20260303900538", "confirmed": 1, "created_at": "2026-03-03T07:51:05"}, {"stock_code": "145720", "corp_name": "덴티움", "market": "Y", "announce_dt": "20260303", "rcept_no": "20260303800672", "confirmed": 1, "created_at": "2026-03-03T07:51:05"}, {"stock_code": "005380", "corp_name": "현대자동차", "market": "Y", "announce_dt": "20260303", "rcept_no": "20260303800605", "confirmed": 1, "created_at": "2026-03-03T07:51:05"}, {"stock_code": "003620", "corp_name": "KG모빌리티", "market": "Y", "announce_dt": "20260303", "rcept_no": "20260303800597", "confirmed": 1, "created_at": "2026-03-03T07:51:05"}, {"stock_code": "030210", "corp_name": "다올투자증권", "market": "Y", "announce_dt": "20260303", "rcept_no": "20260303801347", "confirmed": 1, "created_at": "2026-03-07T09:10:39"}, {"stock_code": "032350", "corp_name": "롯데관광개발", "market": "Y", "announce_dt": "20260303", "rcept_no": "20260303801308", "confirmed": 1, "created_at": "2026-03-07T09:10:39"}, {"stock_code": "058610", "corp_name": "에스피지", "market": "K", "announce_dt": "20260303", "rcept_no": "", "confirmed": 0, "created_at": "2026-03-07T09:10:39"}, {"stock_code": "007070", "corp_name": "GS리테일", "market": "Y", "announce_dt": "20260304", "rcept_no": "20260304801261", "confirmed": 1, "created_at": "2026-03-04T07:49:35"}, {"stock_code": "034230", "corp_name": "파라다이스", "market": "Y", "announce_dt": "20260304", "rcept_no": "20260304800954", "confirmed": 1, "created_at": "2026-03-04T07:49:35"}, {"stock_code": "114090", "corp_name": "GKL", "market": "Y", "announce_dt": "20260304", "rcept_no": "20260304800849", "confirmed": 1, "created_at": "2026-03-04T07:49:35"}, {"stock_code": "357230", "corp_name": "에이치피오", "market": "K", "announce_dt": "20260304", "rcept_no": "20260304900136", "confirmed": 1, "created_at": "2026-03-04T07:49:35"}, {"stock_code": "011170", "corp_name": "롯데케미칼", "market": "Y", "announce_dt": "20260304", "rcept_no": "20260304801617", "confirmed": 1, "created_at": "2026-03-07T09:10:39"}, {"stock_code": "143240", "corp_name": "사람인", "market": "K", "announce_dt": "20260304", "rcept_no": "", "confirmed": 0, "created_at": "2026-03-07T09:10:39"}, {"stock_code": "014830", "corp_name": "유니드", "market": "Y", "announce_dt": "20260304", "rcept_no": "", "confirmed": 0, "created_at": "2026-03-07T09:10:39"}, {"stock_code": "234340", "corp_name": "헥토파이낸셜", "market": "K", "announce_dt": "20260304", "rcept_no": "", "confirmed": 0, "created_at": "2026-03-07T09:10:39"}, {"stock_code": "003690", "corp_name": "코리안리", "market": "Y", "announce_dt": "20260305", "rcept_no": "20260305800801", "confirmed": 1, "created_at": "2026-03-05T07:47:29"}, {"stock_code": "014620", "corp_name": "성광벤드", "market": "K", "announce_dt": "20260305", "rcept_no": "20260305900567", "confirmed": 1, "created_at": "2026-03-05T07:47:29"}, {"stock_code": "074600", "corp_name": "원익QnC", "market": "K", "announce_dt": "20260305", "rcept_no": "20260305901372", "confirmed": 1, "created_at": "2026-03-07T09:10:39"}, {"stock_code": "204020", "corp_name": "그리티", "market": "K", "announce_dt": "20260305", "rcept_no": "", "confirmed": 0, "created_at": "2026-03-07T09:10:39"}, {"stock_code": "023160", "corp_name": "태광", "market": "K", "announce_dt": "20260306", "rcept_no": "20260306900358", "confirmed": 1, "created_at": "2026-03-06T07:49:21"}, {"stock_code": "265520", "corp_name": "AP시스템", "market": "K", "announce_dt": "20260306", "rcept_no": "20260306901559", "confirmed": 1, "created_at": "2026-03-07T09:10:39"}, {"stock_code": "138930", "corp_name": "BNK금융지주", "market": "Y", "announce_dt": "20260306", "rcept_no": "", "confirmed": 0, "created_at": "2026-03-07T09:10:39"}, {"stock_code": "478560", "corp_name": "블랙야크아이앤씨", "market": "K", "announce_dt": "20260306", "rcept_no": "", "confirmed": 0, "created_at": "2026-03-07T09:10:39"}, {"stock_code": "475150", "corp_name": "SK이터닉스", "market": "Y", "announce_dt": "20260306", "rcept_no": "", "confirmed": 0, "created_at": "2026-03-07T09:10:39"}, {"stock_code": "172670", "corp_name": "에이엘티", "market": "K", "announce_dt": "20260306", "rcept_no": "", "confirmed": 0, "created_at": "2026-03-07T09:10:39"}, {"stock_code": "230360", "corp_name": "에코마케팅", "market": "K", "announce_dt": "20260306", "rcept_no": "", "confirmed": 0, "created_at": "2026-03-07T09:10:39"}];
const UPDATED = "2026-03-07 09:10 KST";
const DOW = ['일','월','화','수','목','금','토'];

function parseDt(d) {
  const y = d.slice(0,4), m = d.slice(4,6), day = d.slice(6,8);
  const dt = new Date(+y, +m-1, +day);
  return { m, day, dow: DOW[dt.getDay()], label: `${y}년 ${m}월 ${Math.ceil(+day/7)}주` };
}

let _filter = 'all';

function setFilter(type, btn) {
  _filter = type;
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const root = document.getElementById('root');
  let data = DATA;

  if (_filter === 'confirmed') data = data.filter(r => r.confirmed === 1);
  else if (_filter === 'expected') data = data.filter(r => r.confirmed === 0);
  else if (_filter === 'KOSPI')  data = data.filter(r => r.market === 'Y');
  else if (_filter === 'KOSDAQ') data = data.filter(r => r.market === 'K');

  if (!data.length) {
    root.innerHTML = '<div class="empty">해당하는 실적발표 일정이 없습니다.</div>';
    return;
  }

  // 주별 그룹
  const weeks = {};
  data.forEach(r => {
    const dt = parseDt(r.announce_dt);
    if (!weeks[dt.label]) weeks[dt.label] = [];
    weeks[dt.label].push({ ...r, _dt: dt });
  });

  const mktLabel = { Y: 'KOSPI', K: 'KOSDAQ', N: 'KONEX', E: '기타' };

  root.innerHTML = Object.entries(weeks).map(([week, rows]) => `
    <div class="week-group">
      <div class="week-label">${week}</div>
      ${rows.map(r => `
        <div class="card">
          <div class="date-badge">
            <div class="day">${r._dt.day}</div>
            <div class="dow">${r._dt.m}/${r._dt.day} ${r._dt.dow}</div>
          </div>
          <div class="card-body">
            <div class="corp-name">${r.corp_name}</div>
            <div class="corp-meta">${r.stock_code} · ${mktLabel[r.market] || r.market}</div>
          </div>
          <span class="badge ${r.confirmed ? 'badge-confirmed' : 'badge-expected'}">
            ${r.confirmed ? '확정' : '예상'}
          </span>
        </div>
      `).join('')}
    </div>
  `).join('');
}

document.getElementById('updated-label').textContent = UPDATED ? `업데이트: ${UPDATED}` : '';
document.getElementById('footer').textContent = UPDATED ? `마지막 업데이트: ${UPDATED}` : '';
render();
</script>
</body>
</html>
